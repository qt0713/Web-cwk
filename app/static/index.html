<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Metadata and Recommendation</title>
  <style>
    :root {
      --bg: #f2efe8;
      --panel: #fff9ef;
      --ink: #1f1f1b;
      --muted: #666055;
      --brand: #b33a2f;
      --brand-soft: #f5d3c4;
      --line: #d8cfc1;
      --ok: #235f3a;
      --warn: #8a5a00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 20%, #ffffff 0%, transparent 45%),
        radial-gradient(circle at 80% 10%, #ffe9d7 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 0.2px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 900px) {
      .grid { grid-template-columns: 1.1fr 1fr; }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h2 {
      margin-top: 0;
      font-size: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.88rem;
      margin-bottom: 4px;
      color: var(--muted);
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      margin-bottom: 8px;
    }

    textarea { min-height: 70px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 9px;
      background: var(--brand);
      color: #fff;
      padding: 9px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease;
      margin-right: 8px;
      margin-top: 6px;
    }

    button.secondary {
      background: #5b554a;
    }

    button:hover { transform: translateY(-1px); }

    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--warn);
    }

    .status.ok { color: var(--ok); }

    .pill {
      display: inline-block;
      border-radius: 999px;
      background: var(--brand-soft);
      color: #4d271f;
      font-size: 0.82rem;
      padding: 4px 10px;
      margin-bottom: 10px;
    }

    .book-item {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 9px;
      margin-bottom: 8px;
      background: #fff;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
      word-break: break-all;
      font-size: 0.8rem;
      color: #333;
      background: #fff;
      border: 1px solid var(--line);
      padding: 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Book Metadata and Recommendation</h1>
    <div class="subtitle">A simple UI for your coursework API: login, CRUD, recommendations, and analytics.</div>

    <div class="grid">
      <section class="card">
        <h2>1) Auth</h2>
        <div class="pill">Register once, then Login</div>
        <label>Username</label>
        <input id="username" value="tester02" />
        <label>Password</label>
        <input id="password" type="password" value="StrongPass123" />
        <div>
          <button id="registerBtn">Register</button>
          <button id="loginBtn">Login</button>
        </div>
        <div id="authStatus" class="status"></div>
        <div id="tokenBox" class="mono" style="display:none"></div>
      </section>

      <section class="card">
        <h2>2) Add Book</h2>
        <label>Title</label>
        <input id="title" value="Dune" />
        <label>Author</label>
        <input id="author" value="Frank Herbert" />
        <div class="row">
          <div>
            <label>Genre</label>
            <input id="genre" value="Sci-Fi" />
          </div>
          <div>
            <label>Published Year</label>
            <input id="publishedYear" type="number" value="1965" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>Average Rating</label>
            <input id="averageRating" type="number" step="0.1" value="4.6" />
          </div>
          <div>
            <label>Ratings Count</label>
            <input id="ratingsCount" type="number" value="1200" />
          </div>
        </div>
        <label>Description</label>
        <textarea id="description">Epic science fiction set on Arrakis.</textarea>
        <button id="createBtn">Create Book</button>
        <div id="bookStatus" class="status"></div>
      </section>

      <section class="card">
        <h2>3) Books and Recommendations</h2>
        <button id="loadBooksBtn">Load Books</button>
        <div id="booksList"></div>
      </section>

      <section class="card">
        <h2>4) Analytics</h2>
        <button id="loadAnalyticsBtn">Load Analytics</button>
        <div id="analyticsStatus" class="status"></div>
        <h3>Genre Distribution</h3>
        <div id="genres"></div>
        <h3>Rating Summary</h3>
        <div id="ratings"></div>
      </section>
    </div>
  </div>

  <script>
    let accessToken = "";

    async function api(path, options = {}) {
      const headers = options.headers || {};
      if (accessToken) {
        headers.Authorization = `Bearer ${accessToken}`;
      }
      if (!headers["Content-Type"] && options.body) {
        headers["Content-Type"] = "application/json";
      }

      const resp = await fetch(path, { ...options, headers });
      const text = await resp.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }
      return { ok: resp.ok, status: resp.status, data };
    }

    function setStatus(id, msg, ok = false) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = ok ? "status ok" : "status";
    }

    document.getElementById("registerBtn").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const res = await api("/api/v1/auth/register", {
        method: "POST",
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        setStatus("authStatus", `Register success: user id ${res.data.id}`, true);
      } else {
        setStatus("authStatus", `Register failed (${res.status}): ${res.data.detail || "Unknown"}`);
      }
    };

    document.getElementById("loginBtn").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const res = await api("/api/v1/auth/login", {
        method: "POST",
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        accessToken = res.data.access_token;
        setStatus("authStatus", "Login success. Token ready.", true);
        const tokenBox = document.getElementById("tokenBox");
        tokenBox.style.display = "block";
        tokenBox.textContent = accessToken;
      } else {
        setStatus("authStatus", `Login failed (${res.status}): ${res.data.detail || "Unknown"}`);
      }
    };

    document.getElementById("createBtn").onclick = async () => {
      const payload = {
        title: document.getElementById("title").value,
        author: document.getElementById("author").value,
        genre: document.getElementById("genre").value,
        published_year: Number(document.getElementById("publishedYear").value),
        average_rating: Number(document.getElementById("averageRating").value),
        ratings_count: Number(document.getElementById("ratingsCount").value),
        description: document.getElementById("description").value
      };

      const res = await api("/api/v1/books", {
        method: "POST",
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        setStatus("bookStatus", `Book created with id ${res.data.id}`, true);
      } else {
        setStatus("bookStatus", `Create failed (${res.status}): ${res.data.detail || "Need login first"}`);
      }
    };

    document.getElementById("loadBooksBtn").onclick = async () => {
      const res = await api("/api/v1/books");
      const container = document.getElementById("booksList");
      container.innerHTML = "";
      if (!res.ok) {
        container.textContent = `Load failed (${res.status}). Please login first.`;
        return;
      }
      for (const book of res.data) {
        const rec = await api(`/api/v1/books/${book.id}/recommendations?limit=3`);
        const block = document.createElement("div");
        block.className = "book-item";
        const recTitles = rec.ok
          ? rec.data.recommendations.map(item => item.title).join(", ") || "No recommendations"
          : "Recommendation unavailable";
        block.innerHTML = `<strong>${book.title}</strong> by ${book.author}<br>
          Genre: ${book.genre} | Rating: ${book.average_rating}<br>
          Recommendations: ${recTitles}`;
        container.appendChild(block);
      }
      if (res.data.length === 0) {
        container.textContent = "No books yet. Create one first.";
      }
    };

    document.getElementById("loadAnalyticsBtn").onclick = async () => {
      const g = await api("/api/v1/analytics/genres");
      const r = await api("/api/v1/analytics/ratings");
      if (!g.ok || !r.ok) {
        setStatus("analyticsStatus", "Analytics failed. Please login first.");
        return;
      }
      setStatus("analyticsStatus", "Analytics loaded.", true);
      document.getElementById("genres").innerHTML = g.data.genres
        .map(x => `<div class='book-item'>${x.genre}: ${x.count}</div>`)
        .join("");
      document.getElementById("ratings").innerHTML = `<div class='book-item'>
        Total Books: ${r.data.total_books}<br>
        Average Rating: ${r.data.average_rating}
      </div>` +
      r.data.top_books.map(b => `<div class='book-item'>Top: ${b.title} (${b.average_rating})</div>`).join("");
    };
  </script>
</body>
</html>
